services:
  oopsie-postgres:
    image: postgres
    container_name: oopsie-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chinook
    ports:
      - "5432:5432"
    volumes:
      - ./Chinook_Postgresql_schema.sql:/docker-entrypoint-initdb.d/Chinook_Postgresql_schema.sql